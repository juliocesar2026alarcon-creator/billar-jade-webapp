
<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Control de Billar — Billar Jade</title>
    <!-- Tailwind por CDN (simple). Si luego quieres, lo pasamos a build de Tailwind CLI. -->
    <script src="https://cdn.tailwindcss.com"></script>
<style>
  /* ====== SOLO aplica dentro de la tarjeta de cada mesa (no toca el panel derecho) ====== */
  .rounded-2xl.border.shadow-sm.p-3 {
    min-height: 240px;                 /* un poco más de alto para respirar */
  }

  /* (ESCRITORIO) Rejilla interna de la mesa ocupada: 2 columnas estables 58% / 42% */
  .rounded-2xl.border.shadow-sm.p-3 .grid.grid-cols-2 {
    display: grid !important;
    grid-template-columns: 58% 42%;
    gap: 10px;
    align-items: start;                /* anclar arriba */
  }

  /* Que las DOS columnas permitan encoger su contenido (clave para evitar empuje) */
  .rounded-2xl.border.shadow-sm.p-3 .grid.grid-cols-2 > * {
    min-width: 0;
  }

  /* Columna derecha (cliente/productos): impedir desbordes hacia la izquierda */
  .rounded-2xl.border.shadow-sm.p-3 .grid.grid-cols-2 > :nth-child(2) {
    overflow: hidden;                  /* nada se sale visualmente */
  }

  /* Cuadros internos blancos: apilar su contenido en columna y algo de espacio vertical */
  .rounded-2xl.border.shadow-sm.p-3 .bg-white.rounded-xl.p-2.border {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  /* Filas de la columna izquierda más legibles */
  .rounded-2xl.border.shadow-sm.p-3 .flex.justify-between {
    line-height: 1.35;
  }

  /* Acciones (Pausar / Mover / Desc.): permitir salto y espaciar */
  .rounded-2xl.border.shadow-sm.p-3 .flex.gap-2 {
    flex-wrap: wrap;
    gap: 8px;
  }

  /* Dentro de cada fila de producto (grid 12 cols), permitir encoger y truncar */
  .rounded-2xl.border.shadow-sm.p-3 .grid.grid-cols-12 > * {
    min-width: 0;
  }
  .rounded-2xl.border.shadow-sm.p-3 .grid.grid-cols-12 .truncate {
    min-width: 0;
  }

  /* Lista de productos: scroll interno y margen para que el scroll no tape texto */
  .rounded-2xl.border.shadow-sm.p-3 .max-h-24,
  .rounded-2xl.border.shadow-sm.p-3 .max-h-28 {
    overflow: auto;
    max-height: 9.5rem;               /* ~152px */
    padding-right: .25rem;
  }

  /* Botones “- / Desc” no rompan su columna */
  .rounded-2xl.border.shadow-sm.p-3 .col-span-3 .btn {
    width: auto;
    white-space: nowrap;
  }

  /* (MÓVIL <= 640px) Apilar columnas y permitir botones a ancho completo si hace falta */
  @media (max-width: 640px) {
    .rounded-2xl.border.shadow-sm.p-3 .grid.grid-cols-2 {
      grid-template-columns: 1fr;     /* apilar izquierda y derecha */
      gap: 8px;
    }
    .rounded-2xl.border.shadow-sm.p-3 .px-2.py-1.rounded-lg {
      width: 100%;
    }
  }
</style>
  </head>
  <body class="bg-neutral-50">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
